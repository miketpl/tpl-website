<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gem-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#009980"/>
    </linearGradient>
    <linearGradient id="gem-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e8bb"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="gem-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#008870"/>
      <stop offset="100%" style="stop-color:#006650"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagonal gem shape -->
  <polygon points="100,20 170,55 170,125 100,160 30,125 30,55" fill="url(#gem-grad)" opacity="0.15"/>
  <polygon points="100,20 170,55 170,125 100,160 30,125 30,55" fill="none" stroke="url(#gem-grad)" stroke-width="2"/>
  <!-- Inner facets -->
  <polygon points="100,36 155,63 155,117 100,144 45,117 45,63" fill="url(#gem-grad)" opacity="0.25"/>
  <!-- Top facet (bright) -->
  <polygon points="100,36 155,63 100,80 45,63" fill="url(#gem-face)" opacity="0.6"/>
  <!-- Left facet -->
  <polygon points="45,63 100,80 100,144 45,117" fill="url(#gem-shadow)" opacity="0.4"/>
  <!-- Right facet -->
  <polygon points="155,63 100,80 100,144 155,117" fill="url(#gem-grad)" opacity="0.35"/>
  <!-- Network node dots -->
  <circle cx="100" cy="36" r="4" fill="#00d4aa"/>
  <circle cx="155" cy="63" r="3.5" fill="#00d4aa" opacity="0.8"/>
  <circle cx="155" cy="117" r="3.5" fill="#00d4aa" opacity="0.6"/>
  <circle cx="100" cy="144" r="4" fill="#00d4aa" opacity="0.7"/>
  <circle cx="45" cy="117" r="3.5" fill="#00d4aa" opacity="0.6"/>
  <circle cx="45" cy="63" r="3.5" fill="#00d4aa" opacity="0.8"/>
  <!-- Center node -->
  <circle cx="100" cy="80" r="5" fill="#00d4aa"/>
  <!-- Connection lines from center -->
  <line x1="100" y1="80" x2="100" y2="36" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="80" x2="155" y2="63" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="80" x2="155" y2="117" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="80" x2="100" y2="144" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="80" x2="45" y2="117" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="80" x2="45" y2="63" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <!-- TPL text -->
  <text x="100" y="188" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" letter-spacing="4" fill="#d4dde6">TPL</text>
</svg>
